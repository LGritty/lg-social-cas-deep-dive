<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VGW Social Casino Positioning Research</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --lg-dark-blue: #20304f;
      --lg-medium-blue: #2281e0;
      --lg-orange: #f3771b;
      --lg-yellow: #fbbc04;
      --lg-teal: #46bdc6;
      --lg-light-blue: #78b6ff;
      --panel-border: #d8deeb;
      --muted-text: #66708a;
      --page-bg: #eef2f7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--page-bg);
      color: var(--lg-dark-blue);
      font-family: "Open Sans", Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    .site-header {
      background: var(--lg-dark-blue);
      color: #fff;
      padding: 28px clamp(18px, 4vw, 56px) 0;
    }

    .header-inner,
    .page-shell {
      width: min(1280px, 100%);
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 24px;
      font-size: clamp(1.65rem, 3vw, 2.65rem);
      line-height: 1.12;
      font-weight: 700;
      letter-spacing: 0;
    }

    .tabs {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding-bottom: 0;
    }

    .tab-button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-bottom: 0;
      border-radius: 8px 8px 0 0;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      padding: 14px 20px;
      white-space: nowrap;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease;
    }

    .tab-button:hover,
    .tab-button:focus-visible {
      background: rgba(255, 255, 255, 0.16);
      outline: none;
    }

    .tab-button[aria-selected="true"] {
      background: #fff;
      border-color: #fff;
      color: var(--lg-dark-blue);
    }

    main {
      padding: clamp(18px, 3vw, 36px) clamp(14px, 4vw, 56px) clamp(28px, 5vw, 56px);
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.is-active {
      display: block;
    }

    .chart-card,
    .placeholder-panel {
      background: #fff;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(32, 48, 79, 0.09);
    }

    .chart-card {
      padding: clamp(14px, 2.4vw, 28px);
    }

    .chart-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      max-height: 540px;
      min-height: 430px;
    }

    .chart-wrap svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .chart-title {
      fill: var(--lg-dark-blue);
      font-size: 30px;
      font-weight: 700;
    }

    .axis-label {
      fill: var(--lg-dark-blue);
      font-size: 18px;
      font-weight: 700;
    }

    .axis-label-small {
      fill: var(--lg-dark-blue);
      font-size: 16px;
      font-weight: 700;
    }

    .tick-label,
    .reference-label {
      fill: var(--muted-text);
      font-size: 13px;
      font-weight: 400;
    }

    .grid-line {
      stroke: #e8edf5;
      stroke-width: 1;
    }

    .axis-line {
      stroke: #9aa6bc;
      stroke-width: 1.5;
    }

    .reference-line {
      stroke: #8793a8;
      stroke-width: 1.15;
      stroke-dasharray: 7 7;
      opacity: 0.66;
    }

    .bubble {
      stroke: #fff;
      stroke-width: 3;
      opacity: 0.9;
    }

    .annotation-line {
      stroke: #6d7890;
      stroke-linecap: round;
      stroke-width: 1.35;
    }

    .annotation-label {
      dominant-baseline: central;
      fill: var(--lg-dark-blue);
      font-size: 15px;
      font-weight: 700;
      pointer-events: none;
    }

    .x-helper-label {
      fill: var(--muted-text);
      font-size: 14px;
      font-style: italic;
      font-weight: 400;
    }

    .placeholder-panel {
      min-height: 420px;
      display: grid;
      place-items: center;
      padding: 40px;
    }

    .placeholder-panel p {
      margin: 0;
      color: var(--muted-text);
      font-size: 1.25rem;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      .site-header {
        padding-top: 22px;
      }

      .tab-button {
        padding: 12px 14px;
        font-size: 0.9rem;
      }

      .chart-card {
        overflow-x: visible;
      }

      .chart-wrap {
        height: min(462px, calc(100vh - 210px));
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1>VGW Social Casino Positioning Research</h1>
      <nav class="tabs" role="tablist" aria-label="Dashboard sections">
        <button class="tab-button" id="tab-positioning" type="button" role="tab" aria-selected="true" aria-controls="panel-positioning" data-tab="positioning">2026 Positioning</button>
        <button class="tab-button" id="tab-revenue" type="button" role="tab" aria-selected="false" aria-controls="panel-revenue" data-tab="revenue">Revenue</button>
        <button class="tab-button" id="tab-content" type="button" role="tab" aria-selected="false" aria-controls="panel-content" data-tab="content">Content Counts</button>
        <button class="tab-button" id="tab-sources" type="button" role="tab" aria-selected="false" aria-controls="panel-sources" data-tab="sources">Sources + Comments</button>
      </nav>
    </div>
  </header>

  <main>
    <div class="page-shell">
      <section class="tab-panel is-active" id="panel-positioning" role="tabpanel" aria-labelledby="tab-positioning">
        <div class="chart-card">
          <div class="chart-wrap">
            <svg id="positioning-chart" role="img" aria-labelledby="positioning-chart-title positioning-chart-desc"></svg>
          </div>
        </div>
      </section>

      <section class="tab-panel" id="panel-revenue" role="tabpanel" aria-labelledby="tab-revenue" hidden>
        <div class="placeholder-panel">
          <p>Coming in next step</p>
        </div>
      </section>

      <section class="tab-panel" id="panel-content" role="tabpanel" aria-labelledby="tab-content" hidden>
        <div class="placeholder-panel">
          <p>Coming in next step</p>
        </div>
      </section>

      <section class="tab-panel" id="panel-sources" role="tabpanel" aria-labelledby="tab-sources" hidden>
        <div class="placeholder-panel">
          <p>Coming in next step</p>
        </div>
      </section>
    </div>
  </main>

  <script>
    const positioningData = [
      {
        platform: "VGW/Chumba",
        shortLabel: "VGW / Chumba",
        xFeatureCount: 7,
        naBrandedPct: 27,
        euOtherPct: 73,
        revenue2026: 3885,
        color: "#20304f",
        labelDx: -56,
        labelDy: -58,
        labelAnchor: "end",
        note: "Revenue bubble uses VGW/Chumba 2026E gross purchases."
      },
      {
        platform: "Crown Coins",
        shortLabel: "Crown",
        xFeatureCount: 15,
        naBrandedPct: 7,
        euOtherPct: 93,
        revenue2026: 3000,
        color: "#2281e0",
        displayDx: -18,
        displayDy: 10,
        labelDx: 72,
        labelDy: 44,
        labelAnchor: "start"
      },
      {
        platform: "McLuck",
        shortLabel: "McLuck",
        xFeatureCount: 14,
        naBrandedPct: 0,
        euOtherPct: 100,
        revenue2026: 2500,
        color: "#fbbc04",
        labelDx: -60,
        labelDy: 42,
        labelAnchor: "end"
      },
      {
        platform: "Modo",
        shortLabel: "Modo",
        xFeatureCount: 15,
        naBrandedPct: 9,
        euOtherPct: 91,
        revenue2026: 1000,
        color: "#f3771b",
        displayDx: 18,
        displayDy: -10,
        labelDx: 40,
        labelDy: -36,
        labelAnchor: "start"
      },
      {
        platform: "Pulsz",
        shortLabel: "Pulsz",
        xFeatureCount: 12,
        naBrandedPct: 0,
        euOtherPct: 100,
        revenue2026: 1200,
        color: "#46bdc6",
        labelDx: -36,
        labelDy: -38,
        labelAnchor: "end"
      },
      {
        platform: "Stake.us",
        shortLabel: "Stake",
        xFeatureCount: 14,
        naBrandedPct: 88,
        euOtherPct: 12,
        revenue2026: 2500,
        color: "#78b6ff",
        labelDx: 46,
        labelDy: -36,
        labelAnchor: "start"
      }
    ];

    const svgNS = "http://www.w3.org/2000/svg";

    function createSvgElement(name, attributes = {}, text = "") {
      const element = document.createElementNS(svgNS, name);

      Object.entries(attributes).forEach(([key, value]) => {
        element.setAttribute(key, value);
      });

      if (text) {
        element.textContent = text;
      }

      return element;
    }

    function renderPositioningChart() {
      const svg = document.getElementById("positioning-chart");
      const width = 1200;
      const height = 675;
      const margin = {
        top: 86,
        right: 140,
        bottom: 88,
        left: 176
      };
      const plot = {
        x: margin.left,
        y: margin.top,
        width: width - margin.left - margin.right,
        height: height - margin.top - margin.bottom
      };
      const maxRevenue = Math.max(...positioningData.map((item) => item.revenue2026));
      const minRevenue = Math.min(...positioningData.map((item) => item.revenue2026));
      const minRadius = 14;
      const maxRadius = 46;
      const bubblePadding = maxRadius + 10;
      const drawablePlot = {
        x: plot.x + bubblePadding,
        y: plot.y + bubblePadding,
        width: plot.width - bubblePadding * 2,
        height: plot.height - bubblePadding * 2
      };

      svg.innerHTML = "";
      svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

      const title = createSvgElement("title", { id: "positioning-chart-title" }, "2026 Social Casino Positions");
      const desc = createSvgElement(
        "desc",
        { id: "positioning-chart-desc" },
        "Bubble positioning chart plotting raw feature count against NA/Branded percentage, with bubble area representing 2026 estimated revenue."
      );
      svg.append(title, desc);

      const xAxisScale = (value) => plot.x + (value / 16) * plot.width;
      const yAxisScale = (value) => plot.y + plot.height - (value / 100) * plot.height;
      const xScale = (value) => drawablePlot.x + (value / 16) * drawablePlot.width;
      const yScale = (value) => drawablePlot.y + drawablePlot.height - (value / 100) * drawablePlot.height;
      const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
      const radiusScale = (value) => {
        if (maxRevenue === minRevenue) return (minRadius + maxRadius) / 2;
        const normalized = (Math.sqrt(value) - Math.sqrt(minRevenue)) / (Math.sqrt(maxRevenue) - Math.sqrt(minRevenue));
        return minRadius + normalized * (maxRadius - minRadius);
      };

      svg.appendChild(createSvgElement("text", {
        class: "chart-title",
        x: width / 2,
        y: 42,
        "text-anchor": "middle"
      }, "2026 Social Casino Positions"));

      const gridGroup = createSvgElement("g", { "aria-hidden": "true" });

      for (let x = 0; x <= 16; x += 2) {
        const px = xAxisScale(x);
        gridGroup.appendChild(createSvgElement("line", {
          class: "grid-line",
          x1: px,
          y1: plot.y,
          x2: px,
          y2: plot.y + plot.height
        }));
        gridGroup.appendChild(createSvgElement("text", {
          class: "tick-label",
          x: px,
          y: plot.y + plot.height + 30,
          "text-anchor": "middle"
        }, String(x)));
      }

      for (let y = 0; y <= 100; y += 25) {
        const py = yAxisScale(y);
        gridGroup.appendChild(createSvgElement("line", {
          class: "grid-line",
          x1: plot.x,
          y1: py,
          x2: plot.x + plot.width,
          y2: py
        }));
        gridGroup.appendChild(createSvgElement("text", {
          class: "tick-label",
          x: plot.x - 18,
          y: py + 5,
          "text-anchor": "end"
        }, `${Math.round(y)}%`));
      }

      svg.appendChild(gridGroup);

      svg.appendChild(createSvgElement("line", {
        class: "axis-line",
        x1: plot.x,
        y1: plot.y + plot.height,
        x2: plot.x + plot.width,
        y2: plot.y + plot.height
      }));
      svg.appendChild(createSvgElement("line", {
        class: "axis-line",
        x1: plot.x,
        y1: plot.y,
        x2: plot.x,
        y2: plot.y + plot.height
      }));

      const thresholdX = xAxisScale(8);
      const thresholdY = yAxisScale(50);
      svg.appendChild(createSvgElement("line", {
        class: "reference-line",
        x1: thresholdX,
        y1: plot.y,
        x2: thresholdX,
        y2: plot.y + plot.height
      }));
      svg.appendChild(createSvgElement("line", {
        class: "reference-line",
        x1: plot.x,
        y1: thresholdY,
        x2: plot.x + plot.width,
        y2: thresholdY
      }));
      svg.appendChild(createSvgElement("text", {
        class: "axis-label",
        x: plot.x - 132,
        y: plot.y + plot.height / 2,
        "text-anchor": "middle"
      }, "RMG Simplicity"));
      svg.appendChild(createSvgElement("text", {
        class: "axis-label",
        x: plot.x + plot.width + 70,
        y: plot.y + plot.height / 2,
        "text-anchor": "middle"
      }, "Liveops"));
      svg.appendChild(createSvgElement("text", {
        class: "x-helper-label",
        x: plot.x,
        y: plot.y + plot.height + 64,
        "text-anchor": "start"
      }, "live features count"));
      svg.appendChild(createSvgElement("text", {
        class: "axis-label-small",
        x: plot.x + plot.width / 2,
        y: plot.y - 20,
        "text-anchor": "middle"
      }, "NA/Branded"));
      svg.appendChild(createSvgElement("text", {
        class: "axis-label-small",
        x: plot.x + plot.width / 2,
        y: plot.y + plot.height + 54,
        "text-anchor": "middle"
      }, "EU/Other"));

      const bubblesGroup = createSvgElement("g");
      const annotationsGroup = createSvgElement("g");
      const renderedPoints = [];

      positioningData
        .slice()
        .sort((a, b) => b.revenue2026 - a.revenue2026)
        .forEach((item) => {
          const cx = xScale(item.xFeatureCount) + (item.displayDx || 0);
          const cy = yScale(item.naBrandedPct) + (item.displayDy || 0);
          const radius = radiusScale(item.revenue2026);
          const group = createSvgElement("g");

          group.appendChild(createSvgElement("circle", {
            class: "bubble",
            cx,
            cy,
            r: radius,
            fill: item.color
          }));

          group.appendChild(createSvgElement("title", {}, `${item.platform}: ${item.xFeatureCount} features, ${Math.round(item.naBrandedPct)}% NA/Branded, 2026E revenue ${item.revenue2026}`));
          bubblesGroup.appendChild(group);
          renderedPoints.push({ ...item, cx, cy, radius });
        });

      svg.appendChild(bubblesGroup);

      renderedPoints.forEach((item) => {
        const labelX = clamp(item.cx + (item.labelDx || 22), plot.x + 12, plot.x + plot.width - 12);
        const labelY = clamp(item.cy + (item.labelDy || -24), plot.y + 14, plot.y + plot.height - 14);
        const angle = Math.atan2(labelY - item.cy, labelX - item.cx);
        const lineStartX = item.cx + Math.cos(angle) * (item.radius + 2);
        const lineStartY = item.cy + Math.sin(angle) * (item.radius + 2);
        const lineEndX = labelX - Math.cos(angle) * 8;
        const lineEndY = labelY - Math.sin(angle) * 4;

        annotationsGroup.appendChild(createSvgElement("line", {
          class: "annotation-line",
          x1: lineStartX,
          y1: lineStartY,
          x2: lineEndX,
          y2: lineEndY
        }));
        annotationsGroup.appendChild(createSvgElement("text", {
          class: "annotation-label",
          x: labelX,
          y: labelY,
          "text-anchor": item.labelAnchor || "start"
        }, item.shortLabel));
      });

      svg.appendChild(annotationsGroup);
    }

    function activateTab(tabName) {
      document.querySelectorAll("[role='tab']").forEach((button) => {
        const isActive = button.dataset.tab === tabName;
        button.setAttribute("aria-selected", String(isActive));
      });

      document.querySelectorAll("[role='tabpanel']").forEach((panel) => {
        const isActive = panel.id === `panel-${tabName}`;
        panel.classList.toggle("is-active", isActive);
        panel.hidden = !isActive;
      });
    }

    document.querySelectorAll("[role='tab']").forEach((button) => {
      button.addEventListener("click", () => activateTab(button.dataset.tab));
    });

    renderPositioningChart();
  </script>
</body>
</html>
